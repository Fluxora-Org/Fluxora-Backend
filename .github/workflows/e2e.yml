name: E2E (nightly)

on:
  schedule:
    # Run at 02:00 UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  e2e:
    name: Stellar Testnet E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fluxora
          POSTGRES_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
          POSTGRES_DB: fluxora_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://fluxora:${{ secrets.E2E_DB_PASSWORD }}@localhost:5432/fluxora_e2e
      HORIZON_URL: ${{ secrets.E2E_HORIZON_URL }}
      NETWORK_PASSPHRASE: ${{ secrets.E2E_NETWORK_PASSPHRASE }}
      JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm run build && node dist/db/migrate.js
        # Secrets are never echoed; DATABASE_URL is injected from env above.

      - name: Run e2e tests
        run: pnpm vitest run tests/e2e --reporter=verbose
        # Retry once on testnet timeout to reduce flakiness from transient RPC issues.
        env:
          VITEST_RETRY: 1
